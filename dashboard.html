<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Issues Dashboard</title>

<!--link for the tailwind and the daisy ui -->
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet"/>

<!-- Font Awesome link  -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

</head>

<!--body is starting from here -->

<body class="bg-gray-200">

<!-- Navbar is starting from here -->

<div class="bg-white shadow">
  <div class="navbar max-w-7xl mx-auto px-6 flex flex-col sm:flex-row gap-3 sm:gap-0">

    <div class="flex items-center gap-2 flex-1">
      <img src="./assets/github-logo.png" class="w-6 h-6">
      <a class="text-xl font-bold text-black">GitHub Issues Tracker</a>
    </div>

    <div class="flex flex-col sm:flex-row gap-3 items-stretch sm:items-center w-full sm:w-auto">

      <div class="relative w-full sm:w-auto">
        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>

        <input
          id="searchInput"
          type="text"
          placeholder="Search issues..."
          class="pl-10 pr-4 py-2 w-full sm:w-72 border border-gray-300 rounded-lg bg-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

      
      <button onclick="searchIssues()" class="btn btn-primary w-full sm:w-auto">
        + New Issue
      </button>

    </div>

  </div>
</div>

<!-- Dashboard part is starting from hereeee -->

<div class="max-w-6xl mx-auto mt-8 px-4">

 
      
    <div class="flex gap-2 mb-6 bg-white rounded-xl py-4 ">

      <button id="allBtn" onclick="filterIssues('all',this)" class="btn btn-primary  h-5 px-10 ml-5">
        All
      </button>

      <button onclick="filterIssues('open',this)" class="btn btn-outline h-5 px-10 ">
        Open
      </button>

      <button onclick="filterIssues('closed',this)" class="btn btn-outline h-5 px-10 ">
        Closed
      </button>

    </div>


  <div class="bg-[#FBFBFB] rounded-xl shadow-sm p-6">



     
  <div class="bg-[#FFFFFF] flex justify-between items-center mb-6 w-full py-5 rounded-xl">


  <div class="flex items-center gap-3 ml-6 ">

    <div class="rounded-full bg-purple-200 p-1">
         <img src="./assets/Aperture.png" alt="" class="w-8 h-8">
      
   </div>

   <div>
    <h2 id="issueCount" class="font-bold text-lg text-black">
      50 Issues
    </h2>
    <P class="">Track and manage your project issues</P>

   </div>
    
  </div>



  <div class="text-sm">

    <span class="text-green-600 font-bold text-xl">
      ● Open
    </span>

    <span class="ml-4 text-purple-600 font-bold mr-6 text-xl">
      ● Closed
    </span>

  </div>

</div>

<!--loading spinner  is hereeee-->

<div id="loadingSpinner" class="hidden flex justify-center items-center h-screen">

  <span class="loading loading-spinner loading-lg text-primary"></span>

</div>
<!-- The div for the issues is here  -->

    <div
      id="issuesContainer"
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

      

    </div>

  </div>

</div>


<script src="./script/dashboard.js"></script>

</body>
</html>
