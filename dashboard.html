<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Issues Dashboard</title>

<!--link for the tailwind and the daisy ui -->
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet"/>

<!-- Font Awesome link  -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

</head>

<!--body is starting from here -->

<body class="bg-gray-200">

<!-- Navbar is starting from here -->

<div class="bg-white shadow">
  <div class="navbar max-w-7xl mx-auto px-4 sm:px-6 flex flex-col sm:flex-row gap-3 sm:gap-0">

    <div class="flex items-center gap-2 flex-1 justify-center sm:justify-start">
      <img src="./assets/github-logo.png" class="w-6 h-6">
      <a class="text-lg sm:text-xl font-bold text-black text-center sm:text-left">GitHub Issues Tracker</a>
    </div>

    <div class="flex flex-col sm:flex-row gap-3 items-stretch sm:items-center w-full sm:w-auto">

      <div class="relative w-full sm:w-auto">
        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>

        <input
          id="searchInput"
          type="text"
          placeholder="Search issues..."
          class="pl-10 pr-4 py-2 w-full sm:w-72 border border-gray-300 rounded-lg bg-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

      
      <button onclick="searchIssues()" class="btn btn-primary w-full sm:w-auto">
        + New Issue
      </button>

    </div>

  </div>
</div>

<!-- Dashboard part is starting from hereeee -->

<div class="max-w-6xl mx-auto mt-6 sm:mt-8 px-4">

 
      
    <div class="flex flex-wrap gap-2 mb-6 bg-white rounded-xl py-4 justify-center sm:justify-start">

      <button id="allBtn" onclick="filterIssues('all',this)" class="btn btn-primary h-8 px-6 sm:px-10 ml-0 sm:ml-5">
        All
      </button>

      <button onclick="filterIssues('open',this)" class="btn btn-outline h-8 px-6 sm:px-10">
        Open
      </button>

      <button onclick="filterIssues('closed',this)" class="btn btn-outline h-8 px-6 sm:px-10">
        Closed
      </button>

    </div>


  <div class="bg-[#FBFBFB] rounded-xl shadow-sm p-4 sm:p-6">



     
  <div class="bg-[#FFFFFF] flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 w-full py-5 rounded-xl gap-4">


  <div class="flex items-center gap-3 ml-0 sm:ml-6">

    <div class="rounded-full bg-purple-200 p-1">
         <img src="./assets/Aperture.png" alt="" class="w-8 h-8">
      
   </div>

   <div>
    <h2 id="issueCount" class="font-bold text-lg text-black">
      50 Issues
    </h2>
    <P class="text-sm sm:text-base">Track and manage your project issues</P>

   </div>
    
  </div>



  <div class="text-sm flex gap-4 sm:gap-0">

    <span class="text-green-600 font-bold text-lg sm:text-xl">
      ● Open
    </span>

    <span class="sm:ml-4 text-purple-600 font-bold text-lg sm:text-xl">
      ● Closed
    </span>

  </div>

</div>

<!--loading spinner  is hereeee-->

<div id="loadingSpinner" class="hidden flex  justify-center items-center items-start h-screen">

  <span class="loading loading-infinity loading-lg text-primary"></span>

</div>

<!-- The div for the issues is hereeee  -->

    <div
      id="issuesContainer"
      class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">

      

    </div>

  </div>

</div>

<!-- Issue details modal  here  -->

<dialog id="issueModal" class="modal">

  <div class="modal-box w-full max-w-lg sm:max-w-2xl lg:max-w-3xl bg-white rounded-2xl p-5 sm:p-8">

   
    <h2 id="modalTitle" class="text-xl sm:text-2xl lg:text-3xl font-bold text-gray-800 mb-3"></h2>

   
    <div class="flex flex-wrap items-center gap-3 text-sm text-gray-500 mb-6">
      <span id="modalStatus"
        class="bg-green-500 text-white px-3 py-1 rounded-full text-xs font-semibold">
        Opened
      </span>

      <span id="modalAuthor"></span>

      <span id="modalDate"></span>
    </div>


    <div id="modalLabels" class="flex flex-wrap gap-2 mb-6">
      
    </div>

    <p id="modalDesc" class="text-gray-600 text-base sm:text-lg mb-6"></p>


    <div class="bg-gray-100 rounded-xl p-4 sm:p-6 flex flex-col sm:flex-row gap-4 sm:gap-0 justify-between mb-8">

      <div>
        <p class="text-gray-500 text-sm">Assignee:</p>
        <p id="modalAssignee" class="font-semibold text-lg"></p>
      </div>

      <div>
        <p class="text-gray-500 text-sm">Priority:</p>
        <span id="modalPriority"
          class="px-4 py-1 bg-red-500 text-white rounded-full text-sm font-semibold">
        </span>
      </div>

    </div>

    <div class="flex justify-end">
      <button onclick="closeModal()"
        class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-lg font-semibold">
        Close
      </button>
    </div>

  </div>

</dialog>


<script src="./script/dashboard.js"></script>

</body>
</html>
