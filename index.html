<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker</title>

<!--  daisyui and the tailwind css link is here  -->

<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<!--  body is starting from hereee  -->
<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white shadow-lg rounded-xl p-8 w-[380px]">

<div class="text-center mb-6 flex flex-col items-center">
<img src="./assets/github-logo.png" alt=""class="w-16 h-16 mb-3">
<h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
<p class="text-gray-500">Sign in to manage your issues</p>

</div>
<!-- the form  is starting from here  -->
<form id="loginForm">

<label class="label font-bold">Username</label>
<input id="username" type="text" placeholder="Enter Username" class="input input-bordered w-full"/>

<p class="text-sm text-purple-600">Default: admin</p>

<label class="label mt-3 font-bold">Password</label>
<input id="password" type="password" placeholder="Enter Password" class="input input-bordered w-full"/>

<p class="text-sm text-purple-600">Default: admin123</p>

<button class="btn btn-primary w-full mt-4">Sign In</button>

</form>
<p class="text-center mt-2  text-gray-500">Demo Credentials:</p>
<div class="text-center mt-3 text-sm bg-gray-100 border-rounded py-3 rounded-xl">

<p><b>Username:</b> admin</p>
<p><b>Password:</b> admin123</p>
</div>

</div>

<script src="./script/login.js"></script>

</body>
</html>
